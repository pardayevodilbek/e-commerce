<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomePage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .card {
        background: white;
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm px-8 py-4 flex items-center justify-between sticky top-0 z-10">
      <span class="text-red-400 font-semibold text-lg">HomePage</span>
      <div class="flex items-center gap-4">

        <a href="wishlist.html" class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
          <span class="wishlistCount absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </a>

        <a href="cart.html" class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span class="cartCount absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">0</span>
        </a>
      </div>
    </nav>


    <main class="max-w-7xl mx-auto px-6 py-10">
      <h1 class="text-2xl font-semibold text-center text-gray-800 mb-8">Products</h1>
      <div class="productsContainer grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </main>

    <script>
      let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let allProducts = [];

      const productsContainer = document.querySelector(".productsContainer");

      function updateBadges() {
        document.querySelectorAll(".wishlistCount").forEach(el => el.textContent = wishlist.length);
        document.querySelectorAll(".cartCount").forEach(el => el.textContent = cart.length);
      }
      updateBadges();
    </script>
    <script src="js/index.js"></script>
  </body>
</html>
